name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Vercel Deployment
        run: |
          echo "Deployment triggered automatically by Vercel for push to main."
          echo "Please ensure your repository is connected to Vercel at https://vercel.com"
